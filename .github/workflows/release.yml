name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag, e.g. v1.1.0'
        required: true
      prerelease:
        description: 'Mark this release as a pre-release'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run tests (release gate)
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must look like v1.2.3, got '${{ inputs.version }}'"
            exit 1
          fi

      - name: Create and push tags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          major="${VERSION%%.*}"   # v1.2.3 -> v1

          git tag -fa "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

          git tag -fa "$major" -m "Release $VERSION"
          git push -f origin "refs/tags/$major"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(--generate-notes --target "$GITHUB_SHA")
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "$VERSION" "${args[@]}"
