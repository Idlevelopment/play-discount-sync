name: 'Google Play IAP Discount Price Updater'
description: 'Apply configurable discounts to Google Play one-time in-app product prices across every region per product.'
author: 'Idlevelopment'

inputs:
  service-account-json:
    description: 'Full JSON contents of a Google Cloud service-account key with access to the Google Play Android Developer API'
    required: true
  rules-path:
    description: 'Path to the JSON file containing pricing rules, relative to the repository root'
    required: false
    default: 'play-pricing-rules.json'
  dry-run:
    description: 'Set to "true" to log planned changes without modifying anything in Play Console'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install dependencies
      shell: bash
      run: pip install -r "${{ github.action_path }}/scripts/requirements.txt"

    - name: Update Google Play IAP pricing
      shell: bash
      env:
        GOOGLE_SERVICE_ACCOUNT_JSON: ${{ inputs.service-account-json }}
        DRY_RUN: ${{ inputs.dry-run }}
        RULES_PATH: ${{ inputs.rules-path }}
      run: python "${{ github.action_path }}/scripts/update_pricing.py"

branding:
  icon: 'tag'
  color: 'green'
